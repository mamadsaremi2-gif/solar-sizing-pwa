<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>حالت آفلاین</title>
    <style>
      body { font-family: Tahoma, sans-serif; margin: 0; background: #f8fafc; color: #0f172a; }
      .wrap { max-width: 720px; margin: 0 auto; padding: 48px 20px; }
      .card { background: white; border: 1px solid #e2e8f0; border-radius: 24px; padding: 24px; box-shadow: 0 10px 30px rgba(15,23,42,0.08); }
      h1 { margin-top: 0; color: #6d28d9; }
      p { line-height: 1.9; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>اپ در حالت آفلاین است</h1>
        <p>پوسته برنامه ذخیره شده و پس از اتصال مجدد اینترنت، داده های تازه بارگذاری می شوند.</p>
        <p>اگر این صفحه را داخل نسخه نصب شده اپ می بینید، یک بار بعد از اتصال دوباره برنامه را باز کنید.</p>
      </div>
    </div>
  </body>
</html>
